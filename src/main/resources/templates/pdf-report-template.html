<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Relatório de Utilizador</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: #333;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #00c8b3;
            padding-bottom: 10px;
        }
        .header h1 {
            color: #008a7c;
            margin: 0;
        }
        .user-summary {
            margin-bottom: 30px;
            background-color: #f7fdfc;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e0f5f3;
        }
        .user-summary h2 {
            margin-top: 0;
            color: #008a7c;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Infelizmente, grid não é suportado. Usaremos tabela. */
            width: 100%;
        }
        .stat {
            background-color: #fff;
            padding: 10px;
            border-radius: 5px;
            margin: 5px;
            text-align: center;
            border: 1px solid #eee;
        }
        .stat .value {
            font-size: 1.5em;
            font-weight: bold;
            color: #00c8b3;
        }
        .stat .label {
            font-size: 0.9em;
            color: #666;
        }
        .ranking-section h2 {
            text-align: center;
            color: #008a7c;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #00c8b3;
            color: white;
            text-align: center;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Miku Quiz - Relatório de Desempenho</h1>
    </div>

    <div class="user-summary">
        <h2>Resumo do Utilizador</h2>
        <p><strong>Nome:</strong> <span th:text="${user.name}">Nome do Utilizador</span></p>
        <p><strong>Email:</strong> <span th:text="${user.email}">email@exemplo.com</span></p>

        <table style="width:100%;">
            <tr>
                <td class="stat">
                    <div class="value" th:text="${user.totalPoints}">10,500</div>
                    <div class="label">Pontos Totais</div>
                </td>
                <td class="stat">
                    <div class="value" th:text="${#numbers.formatDecimal(user.accuracyPercent, 1, 2)} + '%'">92.5%</div>
                    <div class="label">Precisão Média</div>
                </td>
            </tr>
            <tr>
                <td class="stat">
                    <div class="value" th:text="${user.quizzesPlayed}">15</div>
                    <div class="label">Quizzes Jogados</div>
                </td>
                <td class="stat">
                    <div class="value" th:text="${user.maxStreak}">12</div>
                    <div class="label">Melhor Sequência</div>
                </td>
            </tr>
        </table>
    </div>

    <div class="ranking-section">
        <h2>Ranking Global (Top 10)</h2>
        <table>
            <thead>
                <tr>
                    <th>Pos.</th>
                    <th>Jogador</th>
                    <th>Pontuação</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="entry : ${ranking}">
                    <td style="text-align:center;" th:text="${entry.position}">1</td>
                    <td th:text="${entry.userName}">Nome do Jogador</td>
                    <td style="text-align:right;" th:text="${#numbers.formatInteger(entry.score, 0, 'POINT')}">150,000</td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
